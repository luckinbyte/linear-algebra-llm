<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>线性代数：打开大语言模型的黑箱</title>
  <!-- Theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --theme-color: #42b983;
      --sidebar-width: 280px;
      --base-font-size: 16px;
      --sidebar-toggle-offset-top: 15px;
    }
    .markdown-section h1 { color: var(--theme-color); }
    .markdown-section h2 { margin-top: 2.5em; border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
    .markdown-section h3 { margin-top: 1.8em; }
    .markdown-section code { font-size: 0.9em; }
    .markdown-section pre { background: #1e1e1e; }
    .markdown-section pre > code { color: #e0e0e0; }
    /* LaTeX block centering */
    .katex-display { margin: 1.5em 0; overflow-x: auto; }
    /* Custom block styling */
    blockquote { border-left: 4px solid var(--theme-color); background: rgba(66,185,131,0.08); }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '线性代数：打开大语言模型的黑箱',
      nameLink: '#/README',
      loadSidebar: 'SUMMARY.md',
      alias: {
        '/.*/SUMMARY.md': 'SUMMARY.md',
      },
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: '搜索',
        noData: '没有结果',
        depth: 6,
      },
      pagination: {
        previousText: '上一章节',
        nextText: '下一章节',
        crossChapter: true,
        crossChapterText: true,
      },
      copyCode: {
        buttonText: '复制',
        errorText: '错误',
        successText: '已复制',
      },
      plugins: [
        // MathJax integration for docsify.
        // docsify renders Markdown with marked BEFORE MathJax runs. marked treats
        // the `_` in LaTeX subscripts (e.g. \mathbf{v}_{w_I}, \sum_{w=1}^{W}) as
        // emphasis delimiters, pairs them up, and injects raw <em> tags inside
        // the math — eating the underscores and producing invalid LaTeX that
        // MathJax cannot render. Fix: lift every $$...$$ and $...$ expression out
        // of the text into placeholders in beforeEach (before marked sees it),
        // then restore the pristine LaTeX in afterEach so MathJax typesets it.
        function mathJaxPlugin(hook) {
          var mathStore = [];
          hook.beforeEach(function(content) {
            mathStore = [];
            // display math first (may span newlines), then inline math
            content = content.replace(/\$\$([\s\S]+?)\$\$/g, function(m) {
              var id = mathStore.length;
              mathStore[id] = m;
              return '@@MD@@' + id + '@@MD@@';
            });
            content = content.replace(/\$([^\n$]+?)\$/g, function(m) {
              var id = mathStore.length;
              mathStore[id] = m;
              return '@@MD@@' + id + '@@MD@@';
            });
            return content;
          });
          hook.afterEach(function(html) {
            html = html.replace(/@@MD@@(\d+)@@MD@@/g, function(_, id) {
              return mathStore[id];
            });
            return html;
          });
          hook.doneEach(function() {
            if (window.MathJax) {
              MathJax.typesetPromise();
            }
          });
        }
      ],
    };
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- Search plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- Copy code plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/copy-code.min.js"></script>
  <!-- Pagination plugin -->
  <script src="https://unpkg.com/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <!-- Emoji plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>

  <!-- MathJax for LaTeX -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$']],
        displayMath: [['$$', '$$']],
        processEscapes: true,
        processEnvironments: true,
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'],
      },
      startup: {
        ready: () => {
          MathJax.startup.defaultReady();
        },
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <!-- GA (optional, remove if not needed) -->
</body>
</html>
